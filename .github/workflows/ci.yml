name: NexFlow CI

on:
  push:
    branches: [main, develop, improvements]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type-check ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint (Turbo)
        run: npx turbo run lint --filter='!ai-orchestrator'

  # ── Build all TypeScript workspaces ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build (Turbo)
        run: npx turbo run build --filter='!ai-orchestrator'

  # ── Unit tests (NestJS services) ──────────────────────────────────────────
  test-node:
    name: Unit Tests (Node)
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nexflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres_pass@localhost:5432/nexflow_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CLERK_SECRET_KEY: sk_test_placeholder
      SLA_CRITICAL_RESPONSE_MIN: 15
      SLA_CRITICAL_RESOLVE_MIN: 60
      SLA_HIGH_RESPONSE_MIN: 60
      SLA_HIGH_RESOLVE_MIN: 240
      SLA_MEDIUM_RESPONSE_MIN: 240
      SLA_MEDIUM_RESOLVE_MIN: 1440
      SLA_LOW_RESPONSE_MIN: 1440
      SLA_LOW_RESOLVE_MIN: 4320
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests (all NestJS services)
        run: >
          npx turbo run test
          --filter='auth-service'
          --filter='work-item-service'
          --filter='helpdesk-service'
          --filter='realtime-service'
          --filter='notification-service'
          --filter='kb-service'
          --filter='asset-service'
          --filter='reporting-service'
          --filter='integration-service'

  # ── Python tests (AI Orchestrator) ───────────────────────────────────────
  test-python:
    name: Python Tests (AI Orchestrator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install uv
      - run: uv sync
      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY: sk-placeholder
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ── Docker build validation ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - services/auth-service
          - services/helpdesk-service
          - services/work-item-service
          - services/realtime-service
          - services/notification-service
          - services/kb-service
          - services/asset-service
          - services/reporting-service
          - services/integration-service
          - services/ai-orchestrator
          - apps/gateway
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image — ${{ matrix.service }}
        run: docker build ${{ matrix.service }} --file ${{ matrix.service }}/Dockerfile --tag nexflow-check:latest

  # ── Summary (required check) ───────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, build, test-node, test-python, docker-build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "lint:         ${{ needs.lint.result }}"
          echo "build:        ${{ needs.build.result }}"
          echo "test-node:    ${{ needs.test-node.result }}"
          echo "test-python:  ${{ needs.test-python.result }}"
          echo "docker-build: ${{ needs.docker-build.result }}"
          if [[ \
            "${{ needs.lint.result }}"         != "success" || \
            "${{ needs.build.result }}"        != "success" || \
            "${{ needs.test-node.result }}"    != "success" || \
            "${{ needs.docker-build.result }}" != "success" \
          ]]; then
            exit 1
          fi
