version: '3.8'

services:
  nexflow-db:
    image: postgres:16
    container_name: nexflow-db
    environment:
      - POSTGRES_DB=nexflow
      - POSTGRES_PASSWORD=postgres_pass
      - POSTGRES_USER=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/database/migrations:/docker-entrypoint-initdb.d
      - ./apps/database/seed.sql:/docker-entrypoint-initdb.d/999_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nexflow-cache:
    image: redis:7-alpine
    container_name: nexflow-cache
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nexflow-search:
    image: elasticsearch:8.10.2
    container_name: nexflow-search
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

volumes:
  pgdata:
  redisdata:
  esdata:
