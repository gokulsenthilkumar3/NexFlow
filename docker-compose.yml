version: '3.8'

services:
  nexflow-db:
    image: postgres:16
    container_name: nexflow-db
    environment:
      - POSTGRES_DB=nexflow
      - POSTGRES_PASSWORD=postgres_pass
      - POSTGRES_USER=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/database/migrations:/docker-entrypoint-initdb.d
      - ./apps/database/seed.sql:/docker-entrypoint-initdb.d/999_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nexflow-realtime:
    build: ./services/realtime-service
    container_name: nexflow-realtime
    ports:
      - "${REALTIME_PORT:-4000}:4000"
    environment:
      - PORT=4000
      - REDIS_HOST=nexflow-cache
      - REDIS_PORT=6379
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      nexflow-cache:
        condition: service_healthy
    restart: unless-stopped

  nexflow-notifications:
    build: ./services/notification-service
    container_name: nexflow-notifications
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - REDIS_HOST=nexflow-cache
      - REDIS_PORT=6379
      - SMTP_HOST=${SMTP_HOST:-smtp.ethereal.email}
      - SMTP_PORT=${SMTP_PORT:-587}
      - REALTIME_SERVICE_URL=http://nexflow-realtime:4000
    depends_on:
      nexflow-cache:
        condition: service_healthy
    restart: unless-stopped

  nexflow-gateway:
    image: nginx:alpine
    container_name: nexflow-gateway
    ports:
      - "8080:80"
    volumes:
      - ./apps/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nexflow-db
      - nexflow-cache
      - nexflow-realtime
      - nexflow-notifications
    restart: unless-stopped

  nexflow-cache:
    image: redis:7-alpine
    container_name: nexflow-cache
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nexflow-search:
    image: elasticsearch:8.10.2
    container_name: nexflow-search
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

volumes:
  pgdata:
  redisdata:
  esdata:
